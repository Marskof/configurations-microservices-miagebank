server:
  port: 8080 

spring:
  cloud:
    gateway:
      routes:
        - id: route-comptes
          uri: lb://COMPTESERVICE 
          predicates:
            - Path=/api/compte/**

        - id: route-clients
          uri: lb://CLIENTSERVICE
          predicates:
            - Path=/api/clients/** 

        - id: route-composite
          uri: lb://COMPOSITESERVICE
          predicates:
            - Path=/api/composite/**
    service-registry:
      auto-registration:
        register-management: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    metadata-map:
      prometheus.scrape: "true"
      prometheus.path: "/actuator/prometheus"
      prometheus.port: "${server.port}"
      
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans" 


