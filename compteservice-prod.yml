server:
  port: 46000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db_comptes?createDatabaseIfNotExist=true
    username: root 
    password: "root"   
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true     

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  instance:
    metadata-map:
      prometheus.scrape: "true"
      prometheus.path: "/actuator/prometheus"
      prometheus.port: "${server.port}"
      
spring:
  cloud: 
    service-registry:
      auto-registration:
        register-management: true
