server:
  port: 46001

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/db_clients 

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  instance:
    metadata-map:
      prometheus.scrape: "true"
      prometheus.path: "/actuator/prometheus"
      prometheus.port: "${server.port}"
      
spring:
  cloud: 
    service-registry:
      auto-registration:
        register-management: true

